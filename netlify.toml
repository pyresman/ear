[build]
  command = "node scripts/build-config.js"
  publish = "public"

# SPA routing: all non-file requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Status = 404 }

# Static assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

# JavaScript and CSS files cache longer
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
