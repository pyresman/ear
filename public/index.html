<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EARBOMB - Self-Destructing Audio Messages</title>
    <script src="/config.js"></script>
    <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; }
        .tab {
            flex: 1;
            padding: 14px;
            border: none;
            background: rgba(0,0,0,0.3);
            color: rgba(255,255,255,0.7);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        .tab.active { background: linear-gradient(135deg, #ff6b6b, #ffa500); color: #fff; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .record-area { text-align: center; padding: 30px 0; }
        .record-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid transparent;
            background: conic-gradient(#ff6b6b, #ffa500, #ff6b6b);
            cursor: pointer;
            margin: 0 auto 20px;
            display: block;
            position: relative;
            transition: all 0.3s;
        }
        .record-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #1a1a2e;
        }
        .record-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ff4444;
        }
        .record-btn.recording::before { width: 40px; height: 40px; border-radius: 8px; }
        .record-btn.recording::after { display: none; }
        .record-btn.recording { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px rgba(255,68,68,0.5); } 50% { box-shadow: 0 0 60px rgba(255,68,68,0.8); } }
        
        .timer { font-size: 2.5em; font-family: monospace; margin: 15px 0; letter-spacing: 4px; }
        .status { color: #888; font-size: 0.9em; }
        .status.recording { color: #ff4444; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .options { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 20px; margin: 20px 0; }
        .option-group { margin-bottom: 15px; }
        .option-group:last-child { margin-bottom: 0; }
        .option-label { display: block; margin-bottom: 8px; color: #888; font-size: 0.9em; }
        
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1em;
        }
        
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1em;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #ff6b6b;
        }
        .checkbox-group label {
            color: #aaa;
            cursor: pointer;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,107,107,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        
        .result { display: none; text-align: center; animation: fadeIn 0.4s; }
        .result.show { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
        
        .code-display {
            font-size: 3em;
            font-family: monospace;
            letter-spacing: 8px;
            color: #ff6b6b;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        
        .link-display {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.85em;
            word-break: break-all;
            margin: 15px 0;
            color: #aaa;
        }
        
        .password-display {
            background: rgba(255,107,107,0.2);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            margin: 15px 0;
            border: 1px solid rgba(255,107,107,0.3);
        }
        
        .qr-section { text-align: center; margin: 20px 0; }
        .qr-container {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            display: inline-block;
        }
        #qrCanvas {
            display: block;
        }
        
        .share-options {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .share-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .share-btn.whatsapp { background: #25D366; color: #fff; }
        .share-btn.telegram { background: #0088cc; color: #fff; }
        .share-btn.signal { background: #3a76f0; color: #fff; }
        .share-btn.email { background: #ea4335; color: #fff; }
        .share-btn.sms { background: #34a853; color: #fff; }
        .share-btn.clipboard { background: rgba(255,255,255,0.1); color: #fff; }
        .share-btn.native { background: linear-gradient(135deg, #ff6b6b, #ffa500); color: #fff; }
        .share-btn.session { background: #1c1c1e; color: #fff; }
        .share-btn.threema { background: #2d9cdb; color: #fff; }
        .share-btn.wire { background: #00aaff; color: #fff; }
        .share-btn.messenger { background: #0084ff; color: #fff; }
        .share-btn.twitter { background: #1da1f2; color: #fff; }
        .share-btn.skype { background: #00aff0; color: #fff; }
        .share-btn.qrdownload { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .share-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-group .btn { margin-top: 0; flex: 1; }
        
        .input-group { margin-bottom: 20px; }
        .code-input {
            width: 100%;
            padding: 20px;
            text-align: center;
            font-size: 1.5em;
            font-family: monospace;
            letter-spacing: 8px;
            text-transform: uppercase;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
        }
        .code-input::placeholder { color: #666; letter-spacing: 4px; }
        .code-input:focus { outline: none; border-color: #ff6b6b; }
        
        .player { display: none; text-align: center; padding: 30px 0; }
        .player.show { display: block; }
        .bomb-icon { font-size: 5em; animation: float 2s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .countdown { font-size: 2em; color: #ff6b6b; margin: 20px 0; }
        .visualizer { height: 80px; background: rgba(0,0,0,0.4); border-radius: 12px; margin: 20px 0; }
        
        .destroy-btn { background: linear-gradient(135deg, #ff4444, #ff0000); }
        
        .explosion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ffff00, #ff6600, #ff0000);
            display: none;
            z-index: 9999;
            animation: explode 1.5s forwards;
        }
        @keyframes explode {
            0% { opacity: 0; transform: scale(0); }
            20% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(3); }
        }
        
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.95);
            color: #fff;
            padding: 15px 30px;
            border-radius: 12px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 10001;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border: 1px solid rgba(0,255,136,0.5); }
        .toast.error { border: 1px solid rgba(255,68,68,0.5); }
        
        .footer { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .footer p { font-size: 0.85em; color: #666; }
        
        .direct-link-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .direct-link-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .direct-link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102,126,234,0.4);
        }
        
        /* Banner styles */
        .banner-container {
            position: fixed;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: var(--banner-bg-color, rgba(255,255,255,0.02));
            border-bottom: var(--banner-border, 1px solid rgba(255,255,255,0.1));
            color: var(--banner-text-color, #888);
            transition: all 0.3s;
        }
        .banner-container.top {
            top: 0;
            border-bottom: var(--banner-border, 1px solid rgba(255,255,255,0.1));
        }
        .banner-container.bottom {
            bottom: 0;
            border-top: var(--banner-border, 1px solid rgba(255,255,255,0.1));
            border-bottom: none;
        }
        .banner-container.both {
            position: relative;
            margin: 0 -40px;
            width: calc(100% + 80px);
        }
        
        .ad-banner {
            max-width: 100%;
            text-align: center;
        }
        .ad-banner img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .ad-banner.ad-large {
            width: 728px;
            height: 90px;
        }
        .ad-banner.ad-medium {
            width: 468px;
            height: 60px;
        }
        .ad-banner.ad-small {
            width: 320px;
            height: 100px;
        }
        
        /* Stacked banners spacing */
        .banner-container > .ad-banner + .ad-banner {
            margin-top: 10px;
        }
        
        /* Adjust container for banners */
        body.with-banner-top {
            padding-top: 120px;
        }
        body.with-banner-bottom {
            padding-bottom: 120px;
        }
        body.with-banner-both {
            padding-top: 120px;
            padding-bottom: 120px;
        }
    </style>
</head>
<body>
    <div id="bannerTop" class="banner-container top" style="display: none;"></div>
    <div id="bannerBottom" class="banner-container bottom" style="display: none;"></div>
    <div class="container">
        <h1>EARBOMB</h1>
        <p class="subtitle">Self-Destructing Audio Messages</p>
        
        <div class="tabs">
            <button class="tab active" data-tab="create">Record</button>
            <button class="tab" data-tab="receive">Receive</button>
        </div>
        
        <div id="createSection" class="section active">
            <div class="record-area">
                <button class="record-btn" id="recordBtn"></button>
                <div class="timer" id="timer">00:00</div>
                <p class="status" id="status">Click to record</p>
            </div>
            
            <div class="options">
                <div class="option-group">
                    <label class="option-label">Destroy after:</label>
                    <select id="destroyMode">
                        <option value="play">Playing</option>
                        <option value="time">Time expires</option>
                        <option value="both">Both</option>
                    </select>
                </div>
                <div class="option-group" id="timeGroup" style="display:none;">
                    <label class="option-label">Valid for:</label>
                    <select id="destroyTime">
                        <option value="60">1 minute</option>
                        <option value="300">5 minutes</option>
                        <option value="3600" selected>1 hour</option>
                        <option value="86400">24 hours</option>
                    </select>
                </div>
                <div class="option-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="usePassword">
                        <label for="usePassword">Protect with password</label>
                    </div>
                </div>
                <div class="option-group" id="passwordGroup" style="display:none;">
                    <label class="option-label">Password:</label>
                    <input type="password" id="passwordInput" placeholder="Enter password">
                </div>
            </div>
            
            <button class="btn btn-primary" id="sendBtn" disabled>Generate Code</button>
            
            <div class="result" id="result">
                <div class="code-display" id="codeDisplay">------</div>
                
                <div class="link-display" id="linkDisplay"></div>
                
                <div class="password-display" id="passwordDisplay" style="display:none;">
                    <strong>Password:</strong> <span id="passwordText"></span>
                </div>
                
                <div class="qr-section">
                    <div class="qr-container">
                        <canvas id="qrCanvas" width="200" height="200"></canvas>
                    </div>
                </div>
                
                <div class="share-options" id="shareOptions" style="display:none;">
                    <button class="share-btn native" id="nativeShareBtn" style="display:none;">
                        <span>Share</span>
                    </button>
                    <button class="share-btn whatsapp" id="whatsappBtn">
                        WhatsApp
                    </button>
                    <button class="share-btn telegram" id="telegramBtn">
                        Telegram
                    </button>
                    <button class="share-btn signal" id="signalBtn">
                        Signal
                    </button>
                    <button class="share-btn email" id="emailBtn">
                        Email
                    </button>
                    <button class="share-btn sms" id="smsBtn">
                        SMS
                    </button>
                    <button class="share-btn clipboard" id="copyLinkBtn">
                        Copy Link
                    </button>
                    <button class="share-btn session" id="sessionBtn">
                        Session
                    </button>
                    <button class="share-btn threema" id="threemaBtn">
                        Threema
                    </button>
                    <button class="share-btn wire" id="wireBtn">
                        Wire
                    </button>
                    <button class="share-btn messenger" id="messengerBtn">
                        Messenger
                    </button>
                    <button class="share-btn twitter" id="twitterBtn">
                        Twitter
                    </button>
                    <button class="share-btn skype" id="skypeBtn">
                        Skype
                    </button>
                    <button class="share-btn qrdownload" id="qrDownloadBtn">
                        Download QR
                    </button>
                </div>
                
                <div class="direct-link-section">
                    <button class="direct-link-btn" id="openLinkBtn">
                        Open Listen Link
                    </button>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" id="copyBtn">Copy All</button>
                    <button class="btn btn-secondary" id="newBtn">New</button>
                </div>
            </div>
        </div>
        
        <div id="receiveSection" class="section">
            <div class="input-group">
                <input type="text" class="code-input" id="codeInput" placeholder="ENTER CODE" maxlength="8" autocomplete="off">
            </div>
            
            <div class="input-group" id="receivePasswordGroup" style="display:none;">
                <input type="password" id="receivePassword" placeholder="Enter password">
            </div>
            
            <button class="btn btn-primary" id="loadBtn">Unlock</button>
            
            <div class="player" id="player">
                <div class="bomb-icon"></div>
                <div class="countdown" id="countdown">0:00</div>
                <canvas class="visualizer" id="visualizer"></canvas>
                <button class="btn destroy-btn" id="destroyBtn">Destroy Now</button>
            </div>
        </div>
    </div>
    
    <div class="explosion" id="explosion"></div>
    <div class="toast" id="toast"></div>

    <script>
        let mediaRecorder, audioChunks = [], audioBlob = null, isRecording = false;
        let timerInterval, seconds = 0, currentCode = null, currentPassword = null, currentLink = null, audioElement = null;
        
        function apiUrl(path) {
            const base = window.API_BASE_URL || 'https://api.earbomb.org';
            return base + path;
        }
        
        function getShareableLink(code, useHash = false) {
            const base = window.location.origin || 'https://earbomb.org';
            if (useHash) {
                return `${base}/#${code}`;
            } else {
                return `${base}/?code=${code}`;
            }
        }
        
        const recordBtn = document.getElementById('recordBtn');
        const timer = document.getElementById('timer');
        const status = document.getElementById('status');
        const sendBtn = document.getElementById('sendBtn');
        const result = document.getElementById('result');
        const codeDisplay = document.getElementById('codeDisplay');
        const linkDisplay = document.getElementById('linkDisplay');
        const destroyMode = document.getElementById('destroyMode');
        const timeGroup = document.getElementById('timeGroup');
        const usePassword = document.getElementById('usePassword');
        const passwordGroup = document.getElementById('passwordGroup');
        const passwordInput = document.getElementById('passwordInput');
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Section').classList.add('active');
            });
        });
        
        destroyMode.addEventListener('change', () => {
            timeGroup.style.display = destroyMode.value !== 'play' ? 'block' : 'none';
        });
        
        usePassword.addEventListener('change', () => {
            passwordGroup.style.display = usePassword.checked ? 'block' : 'none';
        });
        
        recordBtn.addEventListener('click', () => isRecording ? stopRecording() : startRecording());
        
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    sendBtn.disabled = false;
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordBtn.classList.add('recording');
                status.textContent = 'RECORDING';
                status.classList.add('recording');
                
                seconds = 0;
                timerInterval = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    const s = (seconds % 60).toString().padStart(2, '0');
                    timer.textContent = `${m}:${s}`;
                }, 1000);
            } catch (err) {
                toast('Microphone access denied', 'error');
            }
        }
        
        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.classList.remove('recording');
            status.textContent = 'Recording stopped';
            status.classList.remove('recording');
            clearInterval(timerInterval);
        }
        
        sendBtn.addEventListener('click', async () => {
            if (!audioBlob) return;
            
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            
            try {
                const reader = new FileReader();
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    
                    const payload = {
                        audio: base64,
                        destroyMode: destroyMode.value,
                        destroyTime: document.getElementById('destroyTime').value
                    };
                    
                    if (usePassword.checked && passwordInput.value) {
                        payload.password = passwordInput.value;
                    }
                    
                    const res = await fetch(apiUrl('/api/create'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    
                    if (data.success) {
                        currentCode = data.code;
                        currentPassword = usePassword.checked ? passwordInput.value : null;
                        // Use shareable frontend link instead of API link
                        currentLink = getShareableLink(data.code);
                        codeDisplay.textContent = data.code;
                        linkDisplay.textContent = currentLink;
                        result.classList.add('show');
                        sendBtn.style.display = 'none';
                        
                        if (data.hasPassword) {
                            document.getElementById('passwordDisplay').style.display = 'block';
                            document.getElementById('passwordText').textContent = currentPassword;
                        } else {
                            document.getElementById('passwordDisplay').style.display = 'none';
                        }
                        
                        generateQRCode(currentLink);
                        setupShareButtons(data.code, currentLink, currentPassword);
                        
                        if (navigator.share) {
                            document.getElementById('nativeShareBtn').style.display = 'flex';
                        }
                    } else {
                        toast(data.error || 'Error', 'error');
                    }
                };
                reader.readAsDataURL(audioBlob);
            } catch (err) {
                toast('Connection error', 'error');
            }
            
            sendBtn.disabled = false;
            sendBtn.textContent = 'Generate Code';
        });
        
        function generateQRCode(text) {
            const canvas = document.getElementById('qrCanvas');
            const ctx = canvas.getContext('2d');
            const size = 200;
            
            // Clear canvas
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);
            
            // Generate QR matrix using node-qrcode
            const qr = QRCode.create(text, { errorCorrectionLevel: 'H' });
            const modules = qr.modules;
            const moduleCount = modules.length;
            const moduleSize = size / moduleCount;
            
            // Draw QR code with gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(0.5, '#ffa500');
            gradient.addColorStop(1, '#667eea');
            ctx.fillStyle = gradient;
            
            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (modules[row][col]) {
                        // Add rounded corners to modules
                        const x = col * moduleSize;
                        const y = row * moduleSize;
                        const radius = moduleSize * 0.2;
                        ctx.beginPath();
                        ctx.moveTo(x + radius, y);
                        ctx.lineTo(x + moduleSize - radius, y);
                        ctx.quadraticCurveTo(x + moduleSize, y, x + moduleSize, y + radius);
                        ctx.lineTo(x + moduleSize, y + moduleSize - radius);
                        ctx.quadraticCurveTo(x + moduleSize, y + moduleSize, x + moduleSize - radius, y + moduleSize);
                        ctx.lineTo(x + radius, y + moduleSize);
                        ctx.quadraticCurveTo(x, y + moduleSize, x, y + moduleSize - radius);
                        ctx.lineTo(x, y + radius);
                        ctx.quadraticCurveTo(x, y, x + radius, y);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            }
            
            // Add EARBOMB logo in center
            const centerSize = moduleSize * 7;
            const centerX = size / 2 - centerSize / 2;
            const centerY = size / 2 - centerSize / 2;
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(centerX, centerY, centerSize, centerSize);
            
            ctx.fillStyle = '#ff6b6b';
            ctx.font = `${moduleSize * 3}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('EB', size / 2, size / 2);
        }
        
        function downloadQRCode(text) {
            // Create a temporary canvas for higher resolution
            const scale = 4;
            const size = 200 * scale;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = size;
            tempCanvas.height = size;
            const tempCtx = tempCanvas.getContext('2d');
            
            // Fill background
            tempCtx.fillStyle = '#ffffff';
            tempCtx.fillRect(0, 0, size, size);
            
            // Generate QR matrix using node-qrcode
            const qr = QRCode.create(text, { errorCorrectionLevel: 'H' });
            const modules = qr.modules;
            const moduleCount = modules.length;
            const moduleSize = size / moduleCount;
            
            // Draw QR code in black
            tempCtx.fillStyle = '#000000';
            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (modules[row][col]) {
                        tempCtx.fillRect(col * moduleSize, row * moduleSize, moduleSize, moduleSize);
                    }
                }
            }
            
            // Add EARBOMB logo/text in center
            tempCtx.fillStyle = '#ff6b6b';
            tempCtx.font = `${moduleSize * 6}px Arial`;
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';
            tempCtx.fillText('EARBOMB', size / 2, size / 2);
            
            // Create download link
            const link = document.createElement('a');
            link.download = `earbomb-${text.split('/').pop() || 'code'}.png`;
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
            
            toast('QR code downloaded!', 'success');
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            let text = `Code: ${currentCode}\nLink: ${currentLink}`;
            if (currentPassword) text += `\nPassword: ${currentPassword}`;
            navigator.clipboard.writeText(text);
            toast('Copied!', 'success');
        });
        
        document.getElementById('newBtn').addEventListener('click', () => {
            result.classList.remove('show');
            sendBtn.style.display = 'block';
            sendBtn.disabled = true;
            audioBlob = null;
            timer.textContent = '00:00';
            status.textContent = 'Click to record';
            usePassword.checked = false;
            passwordGroup.style.display = 'none';
            passwordInput.value = '';
            currentCode = null;
            currentPassword = null;
            currentLink = null;
        });
        
        const codeInput = document.getElementById('codeInput');
        const loadBtn = document.getElementById('loadBtn');
        const player = document.getElementById('player');
        const receivePasswordGroup = document.getElementById('receivePasswordGroup');
        const receivePassword = document.getElementById('receivePassword');
        
        codeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        });
        
        let needsPassword = false;
        
        loadBtn.addEventListener('click', async () => {
            const code = codeInput.value.trim().toUpperCase();
            if (!code) return;
            
            loadBtn.disabled = true;
            loadBtn.textContent = 'Loading...';
            
            try {
                const res = await fetch(apiUrl(`/${code}`));
                const data = await res.json();
                
                if (data.exists) {
                    needsPassword = data.needsPassword;
                    
                    if (needsPassword) {
                        receivePasswordGroup.style.display = 'block';
                        if (!receivePassword.value) {
                            receivePassword.focus();
                            loadBtn.disabled = false;
                            loadBtn.textContent = 'Unlock';
                            return;
                        }
                    }
                    
                    const playRes = await fetch(apiUrl(`/${code}/play`), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: receivePassword.value || '' })
                    });
                    const playData = await playRes.json();
                    
                    if (playRes.status === 401) {
                        toast('Invalid password', 'error');
                        loadBtn.disabled = false;
                        loadBtn.textContent = 'Unlock';
                        return;
                    }
                    
                    if (playData.success) {
                        startPlayer(playData.audio, data);
                    } else {
                        toast('Message expired or not found', 'error');
                    }
                } else {
                    toast('Not found', 'error');
                }
            } catch (err) {
                toast('Error', 'error');
            }
            
            loadBtn.disabled = false;
            loadBtn.textContent = 'Unlock';
        });
        
        receivePassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadBtn.click();
        });
        
        function startPlayer(base64Audio, info) {
            player.classList.add('show');
            
            const binaryString = atob(base64Audio);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const blob = new Blob([bytes.buffer], { type: 'audio/webm' });
            audioElement = new Audio(URL.createObjectURL(blob));
            audioElement.volume = 0.8;
            audioElement.play();
            
            visualize(audioElement);
            
            let remaining = info.remaining;
            const countdown = document.getElementById('countdown');
            
            const interval = setInterval(() => {
                remaining--;
                const m = Math.floor(remaining / 60);
                const s = remaining % 60;
                countdown.textContent = `${m}:${s.toString().padStart(2, '0')}`;
                
                if (remaining <= 0) {
                    clearInterval(interval);
                    triggerExplosion();
                }
            }, 1000);
            
            document.getElementById('destroyBtn').onclick = () => {
                clearInterval(interval);
                audioElement.pause();
                triggerExplosion();
            };
            
            audioElement.onended = () => {
                if (info.destroyMode === 'play' || info.destroyMode === 'both') {
                    clearInterval(interval);
                    triggerExplosion();
                }
            };
        }
        
        function visualize(audio) {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            const data = new Uint8Array(analyser.frequencyBinCount);
            
            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(data);
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
                
                const barW = canvas.offsetWidth / analyser.frequencyBinCount * 2;
                let x = 0;
                
                for (let i = 0; i < analyser.frequencyBinCount; i++) {
                    const h = (data[i] / 255) * canvas.offsetHeight;
                    ctx.fillStyle = `hsl(${i * 2}, 80%, 50%)`;
                    ctx.fillRect(x, canvas.offsetHeight - h, barW - 1, h);
                    x += barW;
                }
            }
            draw();
        }
        
        function triggerExplosion() {
            document.getElementById('explosion').style.display = 'block';
            playSound();
            setTimeout(() => {
                document.getElementById('explosion').style.display = 'none';
                player.classList.remove('show');
                toast('Audio destroyed!', 'success');
            }, 1500);
        }
        
        function playSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        }
        
        // Banner system
        async function loadBanners() {
            try {
                const res = await fetch(apiUrl('/api/config'));
                const config = await res.json();
                
                // Apply CSS custom properties
                document.documentElement.style.setProperty('--banner-bg-color', config.bannerBgColor || 'rgba(255,255,255,0.02)');
                document.documentElement.style.setProperty('--banner-border', config.bannerBorderColor ? `1px solid ${config.bannerBorderColor}` : '1px solid rgba(255,255,255,0.1)');
                document.documentElement.style.setProperty('--banner-text-color', config.bannerTextColor || '#888');
                
                const bannerTop = document.getElementById('bannerTop');
                const bannerBottom = document.getElementById('bannerBottom');
                
                // Clear existing banners
                bannerTop.innerHTML = '';
                bannerBottom.innerHTML = '';
                
                // Hide both initially
                bannerTop.style.display = 'none';
                bannerBottom.style.display = 'none';
                document.body.classList.remove('with-banner-top', 'with-banner-bottom', 'with-banner-both');
                
                // Handle different banner modes
                if (config.bannerMode === 'none' || !config.bannerMode) {
                    return;
                }
                
                // Determine banner class based on type
                let bannerClass = '';
                switch(config.bannerType) {
                    case 'large':
                        bannerClass = 'ad-large';
                        break;
                    case 'medium':
                        bannerClass = 'ad-medium';
                        break;
                    case 'small':
                        bannerClass = 'ad-small';
                        break;
                    default:
                        bannerClass = 'ad-large';
                }
                
                // Create banner HTML
                const createBanner = (html) => {
                    const div = document.createElement('div');
                    div.className = `ad-banner ${bannerClass}`;
                    div.innerHTML = html;
                    return div;
                };
                
                // Determine which banners to show based on mode
                const banners = [];
                if (config.bannerHtml1) banners.push(config.bannerHtml1);
                if (config.bannerMode !== 'single' && config.bannerHtml2) banners.push(config.bannerHtml2);
                if (config.bannerMode === 'triple' && config.bannerHtml3) banners.push(config.bannerHtml3);
                
                // Distribute banners based on position
                if (config.bannerPosition === 'top') {
                    // All banners in top container
                    banners.forEach(html => {
                        bannerTop.appendChild(createBanner(html));
                    });
                    if (banners.length > 0) {
                        bannerTop.style.display = 'flex';
                        document.body.classList.add('with-banner-top');
                    }
                } else if (config.bannerPosition === 'bottom') {
                    // All banners in bottom container
                    banners.forEach(html => {
                        bannerBottom.appendChild(createBanner(html));
                    });
                    if (banners.length > 0) {
                        bannerBottom.style.display = 'flex';
                        document.body.classList.add('with-banner-bottom');
                    }
                } else if (config.bannerPosition === 'both') {
                    // Distribute banners between top and bottom
                    if (banners.length >= 1) {
                        bannerTop.appendChild(createBanner(banners[0]));
                        bannerTop.style.display = 'flex';
                    }
                    if (banners.length >= 2) {
                        bannerBottom.appendChild(createBanner(banners[1]));
                        bannerBottom.style.display = 'flex';
                    }
                    if (banners.length >= 3) {
                        // Third banner goes to top (stacked)
                        bannerTop.appendChild(createBanner(banners[2]));
                    }
                    if (bannerTop.style.display === 'flex' || bannerBottom.style.display === 'flex') {
                        document.body.classList.add('with-banner-both');
                    }
                }
                
            } catch (err) {
                console.error('Failed to load banners:', err);
            }
        }
        
        function toast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        function checkUrl() {
            // Check hash (e.g., https://earbomb.org/#ABCDEF)
            const hash = window.location.hash.slice(1);
            if (hash && hash.length >= 6) {
                document.querySelector('[data-tab="receive"]').click();
                codeInput.value = hash.toUpperCase();
                setTimeout(() => loadBtn.click(), 300);
                history.replaceState(null, '', window.location.pathname);
                return;
            }
            
            // Check query parameter (e.g., https://earbomb.org/?code=ABCDEF)
            const urlParams = new URLSearchParams(window.location.search);
            const codeParam = urlParams.get('code');
            if (codeParam && codeParam.length >= 6) {
                document.querySelector('[data-tab="receive"]').click();
                codeInput.value = codeParam.toUpperCase();
                setTimeout(() => loadBtn.click(), 300);
                // Remove query parameter from URL without reload
                const newUrl = window.location.pathname + window.location.hash;
                history.replaceState(null, '', newUrl);
                return;
            }
            
            // Check path (e.g., https://earbomb.org/ABCDEF) - for future server-side routing
            const path = window.location.pathname.slice(1);
            if (path && /^[A-Z0-9]{6,}$/i.test(path)) {
                document.querySelector('[data-tab="receive"]').click();
                codeInput.value = path.toUpperCase();
                setTimeout(() => loadBtn.click(), 300);
                history.replaceState(null, '', window.location.pathname);
            }
        }
        
        window.addEventListener('hashchange', checkUrl);
        window.addEventListener('popstate', checkUrl);
        checkUrl();
        
        // Load banners on page load
        loadBanners();
    </script>
